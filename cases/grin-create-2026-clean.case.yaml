# TIE-OUT: in-kind MV 2,838,400 + cash delivered 236,600 (base plug 34,280 +
# RBLX cash-in-lieu 1,800 x 112.40 = 202,320) = 3,075,000 = creation value.
# Residual 0. It ties -> SETTLE.
# =============================================================================

