# struck fair-value price (112.40), so the basket ties out to the dollar. Gold
# answer: SETTLE. Exists so the eval can tell a genuine reconciler apart from a
# model that just cries "break" on everything (the over-refusal / false-break
# failure mode). See the break case's header for the sourcing note (constructed,
# mechanics-faithful; constituents real, fund/order/delivery illustrative).
