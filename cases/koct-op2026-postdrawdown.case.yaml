  type: constructed_hypothetical
  snapshot_date: 2026-08-14
  NAV_0: 33.00                      # REAL: issuer outcome tool "Starting Fund Value (9/30/2025)"
  NAV_t: 32.70                      # CONSTRUCTED — see construction_note
  S_t: 226.00                       # CONSTRUCTED — 6.60% below Ref0, inside the 205.67-241.96 buffer band
  source: "NAV_0 from the Innovator KOCT fund page (fetched 2026-06-11); NAV_t and S_t constructed"
  construction_note: "CONSTRUCTED HYPOTHETICAL STATE — does not represent actual market history
    (IWM actually stood ~ +18% over the initial reference level as of 2026-06-11). Models a
    drawdown to S_t 226.00, 6.60% below Ref0 241.96 and inside the buffer band: the buffer is
    partially consumed on the reference side. NAV_t 32.70 (-0.91% from NAV_0) is the
    market-consistent in-band mark at 47 days to expiry: the package is pinned near the PV of the
    flat-zone payoff because the long put spread's gains nearly offset the synthetic long's loss
    (per-unit value ~ 238-240 under realistic vols, i.e. fund down ~1% against IWM's -6.6%) —
    the buffer absorbing the move IS the product working; the small dip is time value and carry,
    not a loss event."
  days_remaining: 47                # 2026-09-30 minus 2026-08-14
  days_elapsed: 317                 # 2026-08-14 minus 2025-10-01

