# =============================================================================
# cases/koct-op2026-postdrawdown.case.yaml — GOLD case: Innovator U.S. Small Cap
# Power Buffer ETF — October (KOCT), outcome period 2025-10-01 -> 2026-09-30,
# POST-DRAWDOWN snapshot (CONSTRUCTED HYPOTHETICAL, 2026-08-14 — buffer partially
# consumed, remaining cap ENLARGED).
# -----------------------------------------------------------------------------
# Same fund, same two filings, same distractor packet as koct-op2026-anchor —
# ONLY the oracle snapshot (and therefore P3.entry_framing/E4/E5/C6/C7/S1-S3
# gold) differs — plus one state-specific clause appended to C1's
# not_floor_not_barrier discrimination note.
#
# THE SNAPSHOT IS CONSTRUCTED. It does not represent actual market history
# (IWM actually stood ~ +18% over Ref0 as of 2026-06-11). It models the state
# the rubric's consumed-buffer atoms target: the reference 6.60% BELOW Ref0 —
# inside the buffer band — with the buffer 43.98% consumed on the reference
# side, while today's buyer faces an ENLARGED remaining cap (+18.26% gross vs
# the stated 17.18%) and NO unbuffered gap (the buffer-top price level sits
# ABOVE today's NAV). The in-band NAV barely dips (-0.91%): the long put
# spread's gains nearly offset the synthetic long's loss — the buffer working.
# Traps exercised on top of the anchor's set:
#   * 'breached buffer' misread: partially consumed != breached; 'breached' is
#     an AT-EXPIRY verdict, and an interim NAV dip is time value (C6.direction).
#   * the asymmetric mid-period state: a period-start holder is DOWN while
#     today's buyer gets MORE than the stated cap (stated-vs-remaining cuts the
#     other way here — quoting 17.18% mid-period UNDERSTATES this buyer's upside).
#   * an ACCURATE remaining-terms claim (CL2) — verdict discipline is not
#     'mark everything false'; the recompute decides.
#   * a NOT_VERIFIABLE premium/discount claim (the packet has NAV, no price).
# =============================================================================

