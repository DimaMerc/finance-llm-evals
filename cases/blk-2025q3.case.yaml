      citation: { document: release, locator: "EX-99.1, RECONCILIATION OF GAAP NET INCOME ... — Diluted earnings per common share, as adjusted (3), Three Months Ended Sep 30 2025", verbatim: "Diluted earnings per common share, as adjusted (3) $ 11.55 $ 11.46 $ 12.05 $ 34.89 $ 31.63" }
