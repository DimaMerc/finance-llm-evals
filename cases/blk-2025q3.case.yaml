# =============================================================================
# cases/blk-2025q3.case.yaml — GOLD case: BlackRock, Inc. fiscal Q3 2025
# -----------------------------------------------------------------------------
# Authored from primary SEC sources per cases/_TEMPLATE.case.yaml (rubric 2.1.0).
# Flagship asset-manager vertical. Traps deliberately exercised:
#   * sector-N/A: no gross_profit / inventory / COGS / deferred_revenue (asset manager).
#   * non-GAAP "as adjusted": BLK reports as-adjusted operating margin (44.6%) and
#     as-adjusted diluted EPS ($11.55) with a GAAP-to-as-adjusted reconciliation.
#   * add-backs are presented AFTER-TAX in the net-income reconciliation; there is NO
#     separate "income-tax effect of adjustments" reconciling line (tax is embedded
#     in each after-tax add-back) -> E3.taxeffect_line = N/A (a discipline trap).
#   * segment disaggregation that ties to total revenue is BY GEOGRAPHIC REGION
#     (ASC 280 note): BlackRock operates as ONE operating segment.
#   * share-count subtlety: HPS "Subco Units" became dilutive in Q3 2025 — GAAP
#     diluted shares jumped to 165.18M (incl. 8.25M Subco Units + $70M incremental
#     NI in the diluted numerator); period-END shares (155.12M) is the trap figure.
#   * E6 not-disclosed: operating income/margin BY geographic region (one-segment
#     issuer discloses only total REVENUE by region). Answerable twin: ETF base-fee
#     revenue by client type ($2,130M), buried in the press-release BUSINESS RESULTS.
# =============================================================================

case_id: blk-2025q3
rubric_version: "2.1.0"
authored_from_primary_sources: true

# ----------------------------------------------------------------------------- MANIFEST
manifest:
  ticker: "BLK"
  cik: "0002012383"
  issuer: "BlackRock, Inc."
  sector: "asset_manager"
  fiscal_period_label: "Q3 2025"
  period_end_date: "2025-09-30"
  filing_type: "10-Q"
  is_fiscal_q4: false
  fiscal_vs_calendar_note: "Fiscal year = calendar year (Dec 31 year-end); fiscal Q3 2025 = calendar Q3 2025 (three months ended Sep 30, 2025)."
  reporting_currency: USD
  statement_scale: "millions"          # 10-Q statements: "$ in Millions"; EPS/shares in dollars/whole shares
  consensus_basis: "non_gaap"          # published EPS consensus matches the $11.55 as-adjusted, not $8.43 GAAP
  consensus_statistic: "mean"
  na_figures:
    - gross_profit                     # no cost-of-revenue line (asset manager)
    - inventory_current
    - inventory_prior
    - deferred_revenue_current         # no deferred/unearned revenue line on the face of the balance sheet
    - deferred_revenue_prior
    - cogs
    - tax_effect_of_adjustments        # add-backs presented after-tax; no separate tax-effect reconciling line
    - guidance                         # asset manager gives no quantitative revenue/EPS guidance
    - dio                              # no inventory -> DIO N/A
  expand_counts:
    segment_rows: 3                    # Americas / Europe / Asia-Pacific (geographic disaggregation; no eliminations)
    addback_rows: 6                    # after-tax non-GAAP adjustments in the net-income reconciliation (Q3 2025)

# ----------------------------------------------------------------------------- SOURCES
sources:
  tenq:
    accession: "0001193125-25-267043"
    url: "https://www.sec.gov/Archives/edgar/data/2012383/000119312525267043/blk-20250930.htm"
    primary_doc: "blk-20250930.htm"
  release:
    accession: "0001193125-25-237960"
    index_url: "https://www.sec.gov/Archives/edgar/data/2012383/000119312525237960/"
    ex99_1_url: "https://www.sec.gov/Archives/edgar/data/2012383/000119312525237960/blk-ex99_1.htm"

# ----------------------------------------------------------------------------- CONSENSUS (C5 / S1)
# Consensus is oracle-supplied (NOT in the filings). Non-GAAP (as-adjusted) basis, mean.
# Primary snapshot: Investing.com earnings-call recap (Oct 14, 2025): EPS $11.31, revenue $6.29B.
# Cross-check (dispersion proxy): Zacks Consensus Estimate (via Yahoo Finance, Oct 14, 2025): adjusted EPS $11.19.
consensus:
  revenue: { value_usd_mm: 6290.0, basis: "non_gaap", statistic: "mean" }   # $6.29B (as-adjusted basis = total revenue)
  eps:     { value: 11.31,         basis: "non_gaap", statistic: "mean" }   # adjusted diluted EPS, dollars
  dispersion:
    revenue_range: null                                  # not published in the cited outlets
    eps_range: "alt provider Zacks mean = $11.19 (vs Investing.com $11.31); spread ~$0.12 across providers"
  guidance_consensus: null                               # BlackRock issues no quantitative EPS/revenue guidance
  provider: "Investing.com earnings recap (mean street estimate; as-adjusted basis); cross-checked vs Zacks Consensus Estimate ($11.19 adj EPS) via Yahoo Finance"
  snapshot_date: "2025-10-14"
  source_url: "https://www.investing.com/news/transcripts/earnings-call-transcript-blackrock-q3-2025-beats-forecasts-stock-rises-93CH-4286744"

