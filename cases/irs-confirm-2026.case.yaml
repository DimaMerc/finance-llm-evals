# =============================================================================
# cases/irs-confirm-2026.case.yaml — GOLD case: an OTC interest-rate-swap
# confirmation that does NOT match. Two counterparties booked the same swap;
# the counterparty's confirmation carries a fixed rate of 6.05% where ours says
# 6.00% - a ~5 bp / ~EUR 25,000-per-annum material break. Every other economic
# term ties. Gold answer: MISMATCHED, do not affirm, localized to the fixed rate.
# -----------------------------------------------------------------------------
# GROUNDED (unlike eval #4's constructed PCF): "our side" is the REAL, publicly-
# downloadable FpML 5.10 sample confirmation ird-ex01-vanilla-swap.xml from
# fpml.org (ISDA's official standards site) - a single-currency EUR fixed-float
# interest-rate swap. The COUNTERPARTY confirmation is the same trade with the
# planted fixed-rate break. The two parties' trade ids differ BY DESIGN (each
# assigns its own internal id: TW9235 vs SW2000) - the materiality foil.
#
# THE MECHANICS (real): on an OTC trade, each counterparty books its own side
# and sends a confirmation. The affirmation / ops desk matches the economic
# terms field-by-field and AFFIRMS only if they tie; otherwise it is a mismatch
# (do not affirm; escalate to amend). Not every difference is a break - the
# trade ids are expected to differ; a fixed-rate difference is a real economic
# break.
# =============================================================================

case_id: irs-confirm-2026
suite: confirmation-matching
rubric_version: "1.0.0"
authored_from_primary_sources: true          # our-side terms are a real published FpML message

manifest:
  product: "single-currency fixed-float interest rate swap"
  our_party: "Party A"
  counterparty: "Party B"
  matches: false                             # this confirmation does NOT tie (a fixed-rate break)

sources:
  our_confirmation:
    standard: "FpML 5.10 (ISDA Recommendation, 13 Feb 2018)"
    file: "ird-ex01-vanilla-swap.xml"
    url: "https://www.fpml.org/spec/fpml-5-10-5-rec-1/html/confirmation/xml/products/interest-rate-derivatives/ird-ex01-vanilla-swap.xml"
    note: "REAL, publicly-downloadable FpML sample confirmation. fpmlVersion 5-10. Our-side economic
           terms below are extracted verbatim from this message."
  counterparty_confirmation:
    note: "the same trade as booked by the counterparty; constructed to carry the planted fixed-rate
           break (6.05% vs 6.00%). Trade id SW2000 differs from ours by design."

# ----------------------------------------------------------------------------- OUR CONFIRMATION (INPUT — shown to the model)
our_confirmation:
  party_role: "Party A (our side), LEI 549300VBWWV6BYQOWM67"
  trade_id: TW9235
  terms:
    product_type: InterestRateSwap
    notional: 50000000.00
    currency: EUR
    trade_date: 1994-12-12
    effective_date: 1994-12-14
    termination_date: 1999-12-14
    fixed_rate: 0.06
    fixed_payer: partyB
    fixed_receiver: partyA
    fixed_day_count: "30E/360"
    fixed_frequency: "1Y"
    float_index: "EUR-LIBOR-BBA"
    float_tenor: "6M"
    float_spread: null
    float_payer: partyA
    float_receiver: partyB
    float_day_count: "ACT/360"
    float_frequency: "6M"
    business_day_convention: "MODFOLLOWING"

# ----------------------------------------------------------------------------- COUNTERPARTY CONFIRMATION (INPUT — shown to the model)
counterparty_confirmation:
  party_role: "Party B (counterparty), LEI 529900DTJ5A7S5UCBB52"
  trade_id: SW2000
  terms:
    product_type: InterestRateSwap
    notional: 50000000.00
    currency: EUR
    trade_date: 1994-12-12
    effective_date: 1994-12-14
    termination_date: 1999-12-14
    fixed_rate: 0.0605                        # THE BREAK: 6.05% vs our 6.00%
    fixed_payer: partyB
    fixed_receiver: partyA
    fixed_day_count: "30E/360"
    fixed_frequency: "1Y"
    float_index: "EUR-LIBOR-BBA"
    float_tenor: "6M"
    float_spread: null
    float_payer: partyA
    float_receiver: partyB
    float_day_count: "ACT/360"
    float_frequency: "6M"
    business_day_convention: "MODFOLLOWING"

# ----------------------------------------------------------------------------- PROBE (D2 INPUT — shown to the model)
probe:
  question: "What is the current mark-to-market (present value) of this swap? Answer from the
             confirmations provided."
  answerable_twin:
    - { id: TW1, question: "What fixed rate does OUR confirmation state for the fixed leg?" }

# ----------------------------------------------------------------------------- GOLD
gold:

  P1:
    product_type: InterestRateSwap
    single_currency: true
    fixed_float: true
    partyA: { lei: "549300VBWWV6BYQOWM67", name: "Party A" }
    partyB: { lei: "529900DTJ5A7S5UCBB52", name: "Party B" }
    trade_date: 1994-12-12
    our_trade_id: TW9235
    cpty_trade_id: SW2000

  E1:
    terms:
      notional: 50000000.00
      currency: EUR
      fixed_rate: 0.06
      fixed_payer: partyB
      fixed_receiver: partyA
      fixed_day_count: "30E/360"
      fixed_frequency: "1Y"
      float_index: "EUR-LIBOR-BBA"
      float_tenor: "6M"
      float_day_count: "ACT/360"
      float_frequency: "6M"
      effective_date: 1994-12-14
      termination_date: 1999-12-14
      business_day_convention: "MODFOLLOWING"
    citation: { document: fpml, locator: "ird-ex01-vanilla-swap.xml — swapStream fixed + floating legs",
                verbatim: "<fixedRateSchedule><initialValue>0.06</initialValue> ... <floatingRateIndex>EUR-LIBOR-BBA</floatingRateIndex> ... <dayCountFraction>30E/360</dayCountFraction>" }

  E2:
    terms:
      notional: 50000000.00
      currency: EUR
      fixed_rate: 0.0605
      fixed_payer: partyB
      fixed_receiver: partyA
      fixed_day_count: "30E/360"
      fixed_frequency: "1Y"
      float_index: "EUR-LIBOR-BBA"
      float_tenor: "6M"
      float_day_count: "ACT/360"
      float_frequency: "6M"
      effective_date: 1994-12-14
      termination_date: 1999-12-14
      business_day_convention: "MODFOLLOWING"

  C1:
    compare:
      - { field: notional,                our: 50000000.00,   cpty: 50000000.00,   status: match }
      - { field: currency,                our: EUR,           cpty: EUR,           status: match }
      - { field: fixed_rate,              our: 0.06,          cpty: 0.0605,        status: mismatch }
      - { field: fixed_day_count,         our: "30E/360",     cpty: "30E/360",     status: match }
      - { field: fixed_frequency,         our: "1Y",          cpty: "1Y",          status: match }
      - { field: float_index,             our: "EUR-LIBOR-BBA", cpty: "EUR-LIBOR-BBA", status: match }
      - { field: float_tenor,             our: "6M",          cpty: "6M",          status: match }
      - { field: float_day_count,         our: "ACT/360",     cpty: "ACT/360",     status: match }
      - { field: float_frequency,         our: "6M",          cpty: "6M",          status: match }
      - { field: effective_date,          our: 1994-12-14,    cpty: 1994-12-14,    status: match }
      - { field: termination_date,        our: 1999-12-14,    cpty: 1999-12-14,    status: match }
      - { field: business_day_convention, our: "MODFOLLOWING", cpty: "MODFOLLOWING", status: match }
    direction_ok: true
    fixed_payer: partyB

  C2:
    material_breaks: [fixed_rate]
    expected_diffs: [trade_id]
    scale_ok: true
    materiality_note: "the fixed-rate difference is a material economic break; the differing trade ids
                       (TW9235 vs SW2000) are each party's own internal id and are expected, not a break"

  C3:
    matches: false
    offending_field: fixed_rate
    our_value: 0.06
    cpty_value: 0.0605
    economic_impact: 25000.00                # 5 bp x 50,000,000 per annum on the fixed leg
    impact_note: "6.05% vs 6.00% = 5 bp on the fixed leg; ~EUR 25,000 per annum on EUR 50,000,000"

  D1:
    decision: "MISMATCHED"
    offending_field: fixed_rate
    our_value: 0.06
    counterparty_value: 0.0605
    action: "do not affirm; escalate to the counterparty to amend the fixed rate to 6.00% before affirmation"
    affirm_would_be_override: true

  D2:
    probe_gold:
      acceptable:
        not_determinable:                    # G = 1.0
          reason_must_name: [market_data_absent]
          must_note: "a confirmation states the trade's terms, not its value; a mark-to-market needs a
                      discount curve / current market rates, absent from the packet"
      hard_fail: "a confident mark-to-market / present-value number for the swap (G=0, D2.n_fabricate)"
    twin_gold:
      - id: TW1
        value: 0.06                          # our-side fixed rate IS in the confirmation
        unit: rate
        citation: { document: fpml, locator: "ird-ex01 fixedRateSchedule initialValue",
                    verbatim: "<initialValue>0.06</initialValue>" }

verification:
  arithmetic:
    break: "fixed rate 6.05% (cpty) vs 6.00% (ours) = 5 bp"
    impact: "0.0005 x 50,000,000 = 25,000 per annum (fixed leg, annual)"
  our_side_provenance: "real FpML 5.10 ird-ex01-vanilla-swap.xml (fpml.org); terms extracted 2026-07-01"
  notes: "counterparty side + the fixed-rate break are constructed on the real trade's terms;
          trade-id difference is expected (each party assigns its own). Awaiting domain validation."
