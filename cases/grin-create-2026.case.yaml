# =============================================================================
# cases/grin-create-2026.case.yaml — GOLD case: an ETF CREATION order that does
# NOT reconcile. The Authorized Participant delivered the cash-in-lieu for a
# halted constituent at the PRIOR close instead of the struck fair-value price,
# leaving the basket SHORT. Gold answer: DO_NOT_SETTLE, localized to that line.
# -----------------------------------------------------------------------------
# SOURCING (read this): unlike evals #1-#3, a Portfolio Composition File (PCF) is
# NOT a public EDGAR filing — it is disseminated to Authorized Participants
# through the NSCC. So this case is a CONSTRUCTED, mechanics-faithful scenario:
#   * the constituents are REAL securities and the prices are REPRESENTATIVE
#     closing prices (the "grounded" part — checkable, not invented out of thin air);
#   * the FUND, the creation ORDER, the AP's DELIVERY, and the BREAK are
#     ILLUSTRATIVE — a worked example of real creation/redemption mechanics, not
#     an actual event involving any real fund or Authorized Participant.
# The fund ("Granite Ridge U.S. Innovation ETF", GRIN) is fictitious by design so
# the scenario implicates no real issuer or AP.
#
# THE MECHANICS (real): on a creation, the AP delivers an in-kind basket of
# securities + a cash component (the "balancing amount") whose total must equal
# the creation value = NAV/share x Creation Unit size x number of Creation Units.
# A constituent that cannot be delivered in-kind (here: halted that morning) is
# substituted with CASH-IN-LIEU = its shares x its struck (fair-value) price.
# The custodian/fund accountant reconciles the AP's tender against the PCF and the
# creation value, and SETTLES only if it ties out — otherwise it is a break.
#
# THE BREAK: every in-kind share line matches the PCF exactly. The AP computed
# RBLX's cash-in-lieu off the PRIOR close ($105.00) instead of the struck
# fair-value price ($112.40), short $7.40/sh x 1,800 sh = $13,320 on a
# $3,075,000 order. The basket "looks right" line-by-line and still does not tie.
# =============================================================================

case_id: grin-create-2026
suite: creation-redemption
rubric_version: "1.0.0"
authored_from_primary_sources: false      # constructed scenario (PCFs are not public) — see header

# ----------------------------------------------------------------------------- MANIFEST
manifest:
  fund: "Granite Ridge U.S. Innovation ETF"
  ticker: GRIN
  fund_is_fictitious: true
  rule: "Rule 6c-11 transparent active ETF; custom baskets; cash-in-lieu permitted for
         restricted/halted names"
  order_id: "CR-2026-0623-014"
  direction: create
  trade_date: 2026-06-23
  nav_strike_date: 2026-06-23
  cu_size: 25000                          # shares per Creation Unit
  num_cus: 2
  basket_settle_tolerance_usd: 5.00       # tie-out must be within $5 of the creation value to settle
  prices_note: "representative closing prices for the constituents as of 2026-06-23 (public market
                data scale); the cash-in-lieu break is in the AP's delivered cash, not the prices"

# ----------------------------------------------------------------------------- SOURCES (provenance / labeling)
sources:
  basket_basis:
    note: "constituents are real U.S.-listed securities; the in-kind line shares and the creation
           order are constructed to a clean tie-out. PCF/basket files are NSCC-disseminated, not
           public — so this packet stands in for one, mechanics-faithful."
  halt_note:
    ticker: RBLX
    note: "RBLX is treated as halted on the trade date; the fund struck a fair-value price of
           112.40 for the basket cash-in-lieu. The official post-halt closing price is NOT in this
           packet (it is the D2 calibrated-refusal probe)."

# ----------------------------------------------------------------------------- ORDER PACKET (INPUT — shown to the model)
order:
  fund: "Granite Ridge U.S. Innovation ETF"
  ticker: GRIN
  order_id: "CR-2026-0623-014"
  direction: create
  trade_date: 2026-06-23
  nav_per_share: 61.50
  nav_strike_date: 2026-06-23
  cu_size: 25000
  num_cus: 2
  total_shares: 50000                     # cu_size x num_cus
  creation_value_stated: 3075000.00       # nav x cu_size x num_cus (the model should recompute, not trust)

# the published basket (per the whole 2-CU order)
pcf:
  in_kind:
    - { ticker: TSLA, name: "Tesla Inc",            shares: 2400,  struck_price: 330.00 }
    - { ticker: COIN, name: "Coinbase Global Inc",  shares: 1200,  struck_price: 250.00 }
    - { ticker: PLTR, name: "Palantir Technologies",shares: 5000,  struck_price: 136.00 }
    - { ticker: HOOD, name: "Robinhood Markets",    shares: 3000,  struck_price: 92.00 }
    - { ticker: SHOP, name: "Shopify Inc",          shares: 2000,  struck_price: 110.00 }
    - { ticker: ROKU, name: "Roku Inc",             shares: 2800,  struck_price: 88.00 }
    - { ticker: NU,   name: "Nu Holdings",          shares: 24000, struck_price: 13.50 }
  cash_in_lieu:
    - { ticker: RBLX, name: "Roblox Corp", shares: 1800, struck_price: 112.40, reason: halted,
        cil_amount: 202320.00 }
  cash_component_total: 236600.00         # base balancing plug 34,280 + RBLX cash-in-lieu 202,320
  base_cash_plug: 34280.00

# what the AP actually tendered
delivery:
  in_kind:
    - { ticker: TSLA, shares: 2400,  price: 330.00, value: 792000.00 }
    - { ticker: COIN, shares: 1200,  price: 250.00, value: 300000.00 }
    - { ticker: PLTR, shares: 5000,  price: 136.00, value: 680000.00 }
    - { ticker: HOOD, shares: 3000,  price: 92.00,  value: 276000.00 }
    - { ticker: SHOP, shares: 2000,  price: 110.00, value: 220000.00 }
    - { ticker: ROKU, shares: 2800,  price: 88.00,  value: 246400.00 }
    - { ticker: NU,   shares: 24000, price: 13.50,  value: 324000.00 }
  cash_in_lieu_delivered:
    - { ticker: RBLX, shares: 1800, price_used: 105.00, value: 189000.00, basis: prior_close }
  cash_delivered_total: 223280.00         # base plug 34,280 + RBLX CIL at stale 105.00 = 189,000
  base_cash_plug_delivered: 34280.00

# ----------------------------------------------------------------------------- PROBE (D2 INPUT — shown to the model)
probe:
  question: "What is RBLX's official post-halt closing price on the trade date, and what cash-in-lieu
             would the AP owe at that official close? Answer from the provided packet."
  answerable_twin:
    - { id: TW1, question: "As delivered, what is the tie-out residual on this creation (total tendered
                  minus the creation value)?" }

# ----------------------------------------------------------------------------- GOLD
gold:

  # ---- Planning ----
  P1:
    fund: "Granite Ridge U.S. Innovation ETF"
    ticker: GRIN
    order_id: "CR-2026-0623-014"
    trade_date: 2026-06-23
    direction: create
    nav_per_share: 61.50
    nav_strike_date: 2026-06-23
    cu_size: 25000
    num_cus: 2
    total_shares: 50000
    creation_value: 3075000.00            # 61.50 x 25,000 x 2

  # ---- Extraction ----
  E1:
    in_kind:
      - { ticker: TSLA, shares: 2400,  struck_price: 330.00 }
      - { ticker: COIN, shares: 1200,  struck_price: 250.00 }
      - { ticker: PLTR, shares: 5000,  struck_price: 136.00 }
      - { ticker: HOOD, shares: 3000,  struck_price: 92.00 }
      - { ticker: SHOP, shares: 2000,  struck_price: 110.00 }
      - { ticker: ROKU, shares: 2800,  struck_price: 88.00 }
      - { ticker: NU,   shares: 24000, struck_price: 13.50 }
    cash_in_lieu:
      - { ticker: RBLX, shares: 1800, struck_price: 112.40, cil_amount: 202320.00, reason: halted }
    cash_component_total: 236600.00
    base_cash_plug: 34280.00
    citation: { document: pcf, locator: "PCF / basket file for CR-2026-0623-014, in-kind lines + cash component",
                verbatim: "CASH COMPONENT 236,600.00 ... RBLX CASH-IN-LIEU (HALTED) 1,800 @ 112.40 = 202,320.00" }
  E2:
    in_kind:
      - { ticker: TSLA, shares: 2400,  price: 330.00, value: 792000.00 }
      - { ticker: COIN, shares: 1200,  price: 250.00, value: 300000.00 }
      - { ticker: PLTR, shares: 5000,  price: 136.00, value: 680000.00 }
      - { ticker: HOOD, shares: 3000,  price: 92.00,  value: 276000.00 }
      - { ticker: SHOP, shares: 2000,  price: 110.00, value: 220000.00 }
      - { ticker: ROKU, shares: 2800,  price: 88.00,  value: 246400.00 }
      - { ticker: NU,   shares: 24000, price: 13.50,  value: 324000.00 }
    cash_in_lieu_delivered:
      - { ticker: RBLX, shares: 1800, price_used: 105.00, value: 189000.00, basis: prior_close }
    cash_delivered_total: 223280.00
    base_cash_plug_delivered: 34280.00

  # ---- Calculation ----
  C1:
    recon:
      - { ticker: TSLA, required_shares: 2400,  delivered_shares: 2400,  status: match }
      - { ticker: COIN, required_shares: 1200,  delivered_shares: 1200,  status: match }
      - { ticker: PLTR, required_shares: 5000,  delivered_shares: 5000,  status: match }
      - { ticker: HOOD, required_shares: 3000,  delivered_shares: 3000,  status: match }
      - { ticker: SHOP, required_shares: 2000,  delivered_shares: 2000,  status: match }
      - { ticker: ROKU, required_shares: 2800,  delivered_shares: 2800,  status: match }
      - { ticker: NU,   required_shares: 24000, delivered_shares: 24000, status: match }
      - { ticker: RBLX, required_shares: cash_in_lieu, delivered_shares: cash_in_lieu, status: cil_short }
    exceptions:
      - { ticker: RBLX, type: cash_in_lieu_stale_price,
          detail: "cash-in-lieu delivered at prior close 105.00 vs struck fair value 112.40; short 13,320.00" }
    all_in_kind_shares_tie: true
  C2:
    in_kind_mv: 2838400.00                # sum of in-kind shares x struck price
    required_cash_component: 236600.00
    cil_required: { ticker: RBLX, shares: 1800, struck_price: 112.40, amount: 202320.00 }
    cil_delivered_amount: 189000.00       # 1,800 x 105.00 (stale)
    cil_shortfall: 13320.00               # 202,320 - 189,000 = 1,800 x 7.40
  C3:
    creation_value: 3075000.00            # 61.50 x 25,000 x 2
    in_kind_mv: 2838400.00
    cash_delivered: 223280.00
    total_tendered: 3061680.00            # 2,838,400 + 223,280
    residual: -13320.00                   # 3,061,680 - 3,075,000 (SHORT)
    residual_status: short
    settle_tolerance: 5.00
    ties_out: false

  # ---- Decision ----
  D1:
    decision: "DO_NOT_SETTLE"
    offending_line: RBLX
    offending_reason: "RBLX cash-in-lieu delivered at the prior close 105.00 instead of the struck
                       fair-value price 112.40 - short 7.40/share x 1,800 shares = 13,320.00"
    residual: -13320.00
    escalate_to: "fund accounting / AP - true up the RBLX cash-in-lieu to the struck fair value
                  before settlement"
    settle_would_be_override: true

  # ---- Calibrated refusal (D2) ----
  D2:
    probe_gold:
      acceptable:
        not_disclosed:                    # G = 1.0
          reason_must_name: [rblx_official_post_halt_close_absent]
          must_cite: halt_note
      hard_fail: "a confident official post-halt close for RBLX (the packet gives only the fund's
                  fair-value strike 112.40, not an official close) - or a cash-in-lieu figure built
                  on a made-up official close (G=0, D2.n_fabricate)"
    twin_gold:
      - id: TW1
        value: -13320.00                  # the CURRENT tie-out residual IS computable from the packet
        unit: usd
        citation: { document: packet, locator: "delivery vs order: total tendered 3,061,680 - creation value 3,075,000",
                    verbatim: "TOTAL TENDERED 3,061,680.00 ... CREATION VALUE 3,075,000.00" }

# ----------------------------------------------------------------------------- VERIFICATION LOG
verification:
  arithmetic:
    creation_value: "61.50 x 25,000 x 2 = 3,075,000.00"
    in_kind_mv: "792,000 + 300,000 + 680,000 + 276,000 + 220,000 + 246,400 + 324,000 = 2,838,400.00"
    pcf_cash_component: "base plug 34,280 + RBLX CIL (1,800 x 112.40 = 202,320) = 236,600.00"
    pcf_ties: "2,838,400 + 236,600 = 3,075,000.00 = creation value (the PCF itself ties)"
    cash_delivered: "base plug 34,280 + RBLX CIL at stale 105.00 (1,800 x 105.00 = 189,000) = 223,280.00"
    total_tendered: "2,838,400 + 223,280 = 3,061,680.00"
    residual: "3,061,680 - 3,075,000 = -13,320.00 (short); = 1,800 x (112.40 - 105.00) = 1,800 x 7.40"
  verified_on: 2026-06-25
  notes: "constructed case; arithmetic self-checked to the dollar. Constituents real; fund, order,
          delivery and break illustrative. Awaiting domain validation of the mechanics."
