# ----------------------------------------------------------------------------- CONSENSUS (C5 / S1)
# Oracle-supplied; NOT in the filings. Investing.com earnings recap published 2025-08-27 16:36,
# same day as the print (so it is the Q2 FY2026 consensus). EPS consensus is non-GAAP; the
# article benchmarks the beat against Snowflake's non-GAAP net income per share (the headline
# $0.38 non-GAAP BASIC figure — see note). Revenue consensus is total revenue (~$1.09B).
consensus:
  revenue: { value_usd_mm: 1090.0, basis: "gaap", statistic: "mean" }   # total revenue, $1.09B; revenue is a GAAP top line (consensus is on the as-reported total)
  eps:     { value: 0.27, basis: "non_gaap", statistic: "mean" }        # non-GAAP net income per share consensus
  dispersion: { revenue_range: null, eps_range: null }                  # outlet did not publish high/low or stddev
  guidance_consensus: null                                              # not reported in the cited article
  provider: "Investing.com (consensus analyst estimate)"
  snapshot_date: "2025-08-27"
  source_url: "https://www.investing.com/news/earnings/snowflake-earnings-beat-by-011-revenue-topped-estimates-4213437"
  note: >
    Investing.com: "Snowflake reported second quarter EPS of $0.38, $0.11 better than the analyst
    estimate of $0.27. Revenue for the quarter came in at $1.14B versus the consensus estimate of
    $1.09B." The $0.38 the outlet compares to is Snowflake's non-GAAP net income per share -- BASIC.
    Snowflake also reports non-GAAP DILUTED EPS of $0.35, which is the figure this case treats as the
    adjusted EPS everywhere (E3.adjusted_eps, the C3 bridge, the E2 non-GAAP diluted share count). For
    internal LIKE-FOR-LIKE consistency the deterministic EPS beat/miss (C5.eps_beatmiss_abs) is graded
    on the non-GAAP DILUTED basis: $0.35 - $0.27 = +$0.08 (a beat). The headline +$0.11 uses the
    non-GAAP BASIC actual ($0.38); grading the beat on basic while the memo extracts EPS on diluted
    would be exactly the basic-vs-diluted mismatch the rubric penalizes. (Revenue consensus $1.09B is
    Investing.com's documented total-revenue snapshot; another aggregator, ChartMill, quoted ~$1.11B --
    real consensus dispersion across providers, which is why the eval freezes one cited snapshot.)

