# =============================================================================
# cases/snow-fy2026q2.case.yaml
# Snowflake Inc. (SNOW) — Fiscal Q2 2026, period ended 2025-07-31 (FY ends Jan 31).
# Authored from primary SEC sources per cases/_TEMPLATE.case.yaml (rubric_version 2.1.0).
#
# WHY THIS CASE EXISTS (the traps it is designed to catch):
#   * SCALE TRAP: statements are "in thousands" (P2 gold = thousands). $1,144,969 = ~$1.145B.
#   * GAAP NET LOSS but NON-GAAP NET INCOME POSITIVE. Under the GAAP loss, GAAP diluted =
#     GAAP basic (335,215k) because dilutive securities are anti-dilutive; the NON-GAAP
#     diluted count (372,383k) INCLUDES them and is materially larger. Both captured (E2);
#     C3.nongaap_diluted_differs_from_gaap = true.
#   * SECTOR: SaaS issuer => HAS cost of revenue => gross_profit / gross_margin DO exist
#     (not N/A). INVENTORY / COGS-as-inventory / DIO are N/A. Deferred revenue exists.
#   * SINGLE reportable segment (ASC 280): no multi-segment profit breakout. The revenue
#     DISAGGREGATION (Product vs Professional services & other) is the sum-to-total tie-out.
#   * EFFECTIVE TAX RATE is anomalous: pre-tax LOSS with a small POSITIVE tax provision =>
#     a near-zero NEGATIVE effective rate (a QoE nuance, not operating signal).
#   * OCF/NI sign-flip: OCF positive, GAAP net income negative => ratio is negative and must
#     be interpreted as "OCF positive despite a GAAP net loss (driven by ~$436M SBC add-back)".
# =============================================================================

case_id: snow-2026q2
rubric_version: "2.1.0"
authored_from_primary_sources: true

# ----------------------------------------------------------------------------- MANIFEST
manifest:
  ticker: "SNOW"
  cik: "0001640147"
  issuer: "Snowflake Inc."
  sector: "software"                # application/infra SaaS — HAS cost of revenue + gross profit; NO inventory
  fiscal_period_label: "Fiscal Q2 2026 (three months ended July 31, 2025)"
  period_end_date: "2025-07-31"
  filing_type: "10-Q"
  is_fiscal_q4: false
  fiscal_vs_calendar_note: "FY ends January 31; fiscal Q2 2026 is calendar quarter May 1 - July 31, 2025. The prior sequential quarter is fiscal Q1 2026 (ended April 30, 2025); the year-ago quarter is fiscal Q2 2025 (ended July 31, 2024)."
  reporting_currency: USD
  statement_scale: "thousands"      # "(in thousands, except per share data)" — P2 gold
  consensus_basis: "non_gaap"       # street EPS consensus benchmarked to Snowflake's non-GAAP net income per share
  consensus_statistic: "mean"       # Investing.com analyst estimate (consensus mean)
  na_figures: [inventory_current, inventory_prior, cogs, dio]   # F6 prune set (no inventory for a SaaS issuer)
  expand_counts:
    segment_rows: 2                 # revenue disaggregation: Product revenue + Professional services & other revenue
    addback_rows: 6                 # SBC, amort of acquired intangibles, acquisition/strategic-investment exp, restructuring, asset impairment, amort of debt issuance costs (the tax-effect + NCI lines are separate reconciling lines, not "add-backs")

