# =============================================================================
# cases/koct-op2026-anchor.case.yaml — GOLD case: Innovator U.S. Small Cap Power
# Buffer ETF — October (KOCT), outcome period 2025-10-01 -> 2026-09-30, ANCHOR
# snapshot (REAL, 2026-06-10).
# -----------------------------------------------------------------------------
# Authored from primary SEC sources per cases/_TEMPLATE-defined-outcome.case.yaml
# (eval-#2 rubric 1.0.1). The suite's running example, eight months into the
# outcome period. Traps deliberately exercised:
#   * sibling-vintage distractors: the September and November Power Buffer N-PORTs,
#     filed the SAME DAY with adjacent accession numbers, strikes ~1.7-2.9% apart.
#   * mid-period 497K distractor: a 2026-02-27 filing restating the SAME period-
#     start terms (17.18% / 15%) — "I found the cap in a current filing" is the trap.
#   * in-document P2 trap: the N-PORT's own varInfo designates "RUSSELL 2000 Index"
#     while the strikes are IWM SHARE prices (~$242, not ~2,400 index points).
#   * deep-ITM synthetic-long call (strike 2.42, pctVal 101.24% > 100% of net
#     assets) — real, filed, and not to be "sanity-corrected".
#   * stated-vs-remaining: IWM +17.80% vs Ref0 at snapshot — above the 17.18% cap
#     trajectory — while today's buyer retains only +6.06% gross / +5.82% net to
#     the fixed cap price; quoting "17.18%" to today's buyer is the defining failure.
#   * E5 probe: today's remaining cap appears in NO filing (website-delegated);
#     it is computable from NAV_0/NAV_t + the stated cap. The issuer's own tool
#     prints 5.39% because it nets out fees already incurred — importing that
#     number instead of computing 6.06% scores as an import (E5.n_import).
#     (The tool's incurred-fee count, 254 days, runs inclusively from the 9/30
#     starting-value date to the 6/11 fetch; the case's own pinned convention is
#     exclusive date subtraction: days_elapsed 252 from 10/1, days_remaining 112.)
# Convention notes verified against the issuer page 2026-06-11:
#   * issuer tool "gross" remaining figures = fixed-price-level arithmetic MINUS
#     expenses already incurred (0.79% x 254/365 = 0.55pp); "net" additionally
#     subtracts yet-to-be-incurred fees (0.79% x 111/365 = 0.24pp). Reconciles to
#     <=1bp on remaining-cap and downside rows. The EVAL's pinned convention is
#     the issuer's own published Day-1/Day-20 worked example: pure fixed-price-
#     level arithmetic, net = gross - ER x days_remaining/365 (ACT/365).
# =============================================================================

