# =============================================================================
# cases/msft-fy2026q2.case.yaml
# Microsoft Corporation — Fiscal Q2 2026 (three months ended December 31, 2025).
# Authored from primary SEC sources per cases/_TEMPLATE.case.yaml (rubric_version 2.1.0).
#
# WHY THIS CASE EARNS ITS PLACE IN THE SUITE (designed-in traps):
#   * FISCAL-VS-CALENDAR: MSFT's FY ends June 30, so "Fiscal Q2 2026" is CALENDAR Q4 2025
#     (period ended 2025-12-31). P1 gold uses the FISCAL label; the calendar mapping is a note.
#   * THREE reportable segments (Productivity & Business Processes, Intelligent Cloud,
#     More Personal Computing) that SUM EXACTLY to consolidated revenue with NO
#     corporate/eliminations row (E2 completeness + C5 tie-out).
#   * NON-GAAP with a SINGLE after-tax reconciling item ("Impact from investments in OpenAI"):
#     GAAP NI $38,458M / dil EPS $5.16  ->  non-GAAP NI $30,875M / dil EPS $4.14. The single
#     add-back is presented NET (after-tax), so there is NO separate "tax effect of adjustments"
#     line (E3.tax_effect_of_adjustments = null; C3 tax step is N/A — do not impute a blended rate).
#   * NON-GAAP diluted shares are NOT distinct from GAAP diluted (this is a GAIN-exclusion, not a
#     loss quarter): 30,875 / 7,460 = $4.14. wavg_nongaap_diluted_shares = same 7,460 (noted).
#   * QUALITY-OF-EARNINGS hook: the 60% GAAP net-income jump is driven by a $7.6B NON-CASH OpenAI
#     net gain in "Other income (expense), net" ($9,971M vs $(2,288)M PY). OCF/NI = 0.93 (<1.0) and
#     the effective tax rate ROSE +2.39pp YoY (deferred tax on the OpenAI dilution gain) — the swing
#     factor is the OpenAI mark, not operating outperformance. Operating income (clean) +21%.
#   * GUIDANCE not in the release: MSFT states it "will provide forward-looking guidance ... on its
#     earnings conference call." E4 = not_disclosed (release/MD&A carry no GAAP ranges). The CNBC/LSEG
#     FQ3 revenue range ($80.65B–$81.75B) was given verbally on the CALL and is recorded only in
#     consensus.guidance_consensus for reference — NOT as a filing-sourced E4 gold.
#   * E6 undisclosed probe: Azure absolute-dollar revenue is NEVER disclosed (only a growth %);
#     its answerable twin is the Intelligent Cloud SEGMENT revenue (the segment that contains Azure),
#     which IS disclosed in the ASC 280 footnote.
# =============================================================================

case_id: msft-fy2026q2
