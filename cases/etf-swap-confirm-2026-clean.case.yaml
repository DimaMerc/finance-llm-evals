      - { field: notional,                our: 100000000.00,  cpty: 100000000.00,  status: match }
      - { field: currency,                our: EUR,           cpty: EUR,           status: match }
      - { field: fixed_rate,              our: 0.0425,        cpty: 0.0425,        status: match }
      - { field: fixed_day_count,         our: "30E/360",     cpty: "30E/360",     status: match }
      - { field: fixed_frequency,         our: "1Y",          cpty: "1Y",          status: match }
      - { field: float_index,             our: "EUR-EURIBOR-Reuters", cpty: "EUR-EURIBOR-Reuters", status: match }
